name: Create tag
description: Compute the next production semver tag for the current repo based on its git history.

inputs:
  tag-prefix:
    description: Prefix for all tags (default 'v')
    required: false
    default: v

outputs:
  tag:
    description: Newly computed tag (e.g. v1.3.0)
    value: ${{ steps.compute.outputs.tag }}
  prev_tag:
    description: Previous tag used as comparison base (or 'none')
    value: ${{ steps.compute.outputs.prev_tag }}

runs:
  using: composite
  steps:
    - name: Fetch tags
      shell: bash
      run: git fetch --tags --force --quiet

    - name: Compute tag
      id: compute
      shell: bash
      env:
        PREFIX: ${{ inputs.tag-prefix }}
      run: |
        set -euo pipefail

        PROD_RE="^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$"

        latest_prod=$(git tag --sort=-v:refname | grep -E "$PROD_RE" | head -n1 || true)

        if [[ -z "$latest_prod" ]]; then
          tag="${PREFIX}0.1.0"
          prev_tag="none"
        else
          base="${latest_prod#${PREFIX}}"
          IFS=. read -r MAJ MIN PAT <<<"$base"
          tag="${PREFIX}${MAJ}.$(( MIN + 1 )).0"
          prev_tag="$latest_prod"
        fi

        echo "tag=$tag"           >> "$GITHUB_OUTPUT"
        echo "prev_tag=$prev_tag" >> "$GITHUB_OUTPUT"

        echo "::notice title=create-tag::tag=$tag prev=$prev_tag"
