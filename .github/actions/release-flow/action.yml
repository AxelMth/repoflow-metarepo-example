name: Release flow
description: Compute a tag, create a draft GitHub release, and notify Slack. Called by the release workflow.

inputs:
  repository:
    description: Full repo name 'owner/repo' (for release URLs and API)
    required: true
  github-token:
    description: PAT with repo scope
    required: true
  slack-token:
    description: Slack bot token
    required: true
  channel-id:
    description: Slack channel ID for notifications
    required: true
  dry-run:
    description: Simulate without creating the draft release or posting to Slack
    required: false
    default: "false"

outputs:
  tag:
    description: Computed tag (or would-be tag in dry-run)
    value: ${{ steps.finalize.outputs.tag }}
  prev_tag:
    description: Previous tag
    value: ${{ steps.tag.outputs.prev_tag }}
  skipped:
    description: "'true' if no new commits since prev_tag"
    value: ${{ steps.diff.outputs.skipped }}
  commit_hash:
    description: SHA of the tagged commit
    value: ${{ steps.finalize.outputs.commit_hash }}
  tag_pushed_at:
    description: ISO timestamp of the release creation
    value: ${{ steps.finalize.outputs.tag_pushed_at }}

runs:
  using: composite
  steps:
    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Compute next tag
      id: tag
      uses: ./.github/actions/create-tag

    - name: Check for new commits
      id: diff
      shell: bash
      env:
        PREV_TAG: ${{ steps.tag.outputs.prev_tag }}
      run: |
        set -euo pipefail
        if [[ "$PREV_TAG" == "none" ]]; then
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "commit_count=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        count=$(git rev-list --count "${PREV_TAG}..HEAD")
        if [[ "$count" -eq 0 ]]; then
          echo "::notice::no new commits since $PREV_TAG — skipping release"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        else
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        fi
        echo "commit_count=$count" >> "$GITHUB_OUTPUT"

    - name: Build release notes
      id: notes
      if: ${{ steps.diff.outputs.skipped != 'true' }}
      shell: bash
      env:
        PREV_TAG: ${{ steps.tag.outputs.prev_tag }}
        NEW_TAG: ${{ steps.tag.outputs.tag }}
      run: |
        set -euo pipefail
        if [[ "$PREV_TAG" == "none" ]]; then
          range="HEAD"
        else
          range="${PREV_TAG}..HEAD"
        fi
        {
          echo "notes<<__EOF__"
          git log --no-merges --pretty=format:'- %s (%h)' "$range" | head -n 100
          echo
          echo "__EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: Create draft release
      id: finalize
      if: ${{ steps.diff.outputs.skipped != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        NEW_TAG: ${{ steps.tag.outputs.tag }}
        REPO: ${{ inputs.repository }}
        DRY_RUN: ${{ inputs.dry-run }}
        NOTES: ${{ steps.notes.outputs.notes }}
      run: |
        set -euo pipefail
        pushed_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        commit=$(git rev-parse HEAD)

        if [[ "$DRY_RUN" == "true" ]]; then
          echo "::notice::[dry-run] would create a draft release $NEW_TAG at $commit"
        else
          gh release create "$NEW_TAG" \
            --repo "$REPO" \
            --title "$NEW_TAG" \
            --notes "$NOTES" \
            --draft \
            --target "$commit"
        fi

        echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
        echo "commit_hash=$commit" >> "$GITHUB_OUTPUT"
        echo "tag_pushed_at=$pushed_at" >> "$GITHUB_OUTPUT"

    - name: Notify Slack
      if: ${{ steps.diff.outputs.skipped != 'true' && inputs.dry-run != 'true' }}
      uses: ./.github/actions/notify-slack
      with:
        slack-token: ${{ inputs.slack-token }}
        channel-id: ${{ inputs.channel-id }}
        title: ${{ format('📝 Release draft {0}', steps.finalize.outputs.tag) }}
        body: |
          *${{ inputs.repository }}* → `${{ steps.finalize.outputs.tag }}`
          Commit: `${{ steps.finalize.outputs.commit_hash }}`
          Previous: `${{ steps.tag.outputs.prev_tag }}`
        url: https://github.com/${{ inputs.repository }}/releases/tag/${{ steps.finalize.outputs.tag }}
