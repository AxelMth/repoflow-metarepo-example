name: Release

on:
  workflow_dispatch:
    inputs:
      repos:
        description: "'all' or comma-separated repo names (must match repoflow.config.ts)"
        required: false
        default: "all"
      dry-run:
        description: Simulate without creating draft releases or notifying Slack
        type: boolean
        required: false
        default: false

concurrency:
  group: release-production
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-items: ${{ steps.matrix.outputs.has-items }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install orchestrator dependencies
        run: pnpm install --frozen-lockfile

      - name: Build matrix from repoflow config
        id: matrix
        env:
          REPOS: ${{ github.event.inputs.repos || 'all' }}
        run: |
          set -euo pipefail
          pnpm --silent repoflow list --json > /tmp/repos.json

          matrix=$(REPOS="$REPOS" node --input-type=module - <<'JS'
          import fs from 'node:fs'
          const cfg = JSON.parse(fs.readFileSync('/tmp/repos.json', 'utf8'))
          const all = Array.isArray(cfg) ? cfg : (cfg.repos ?? [])
          const filter = (process.env.REPOS || 'all').trim()
          const wanted = filter === 'all'
            ? null
            : new Set(filter.split(',').map(s => s.trim()).filter(Boolean))

          const items = all
            .filter(r => !wanted || wanted.has(r.name))
            .filter(r => r.prodWorkflow)
            .map(r => {
              const m = /github\.com[:/]([^/]+\/[^/.]+?)(?:\.git)?$/.exec(r.url)
              if (!m) throw new Error(`cannot parse owner/repo from ${r.url}`)
              return { name: r.name, fullName: m[1], workflow: r.prodWorkflow }
            })

          console.log(JSON.stringify(items))
          JS
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(node -e "console.log(JSON.parse(process.argv[1]).length)" "$matrix")
          if [[ "$count" -eq 0 ]]; then
            echo "has-items=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-items=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release ${{ matrix.repo.name }}
    needs: prepare
    if: ${{ needs.prepare.outputs.has-items == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo.fullName }}
          token: ${{ secrets.GIT_PAT_PULL }}
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout meta-repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: .meta
          sparse-checkout: |
            .github/actions
            scripts

      - name: Inject shared actions
        run: |
          mkdir -p .github/actions
          cp -R .meta/.github/actions/. .github/actions/
          mkdir -p scripts
          cp -R .meta/scripts/. scripts/

      - name: Restore target package.json
        run: git checkout -- package.json 2>/dev/null || true

      - name: Release flow
        id: flow
        uses: ./.github/actions/release-flow
        with:
          repository: ${{ matrix.repo.fullName }}
          github-token: ${{ secrets.GIT_PAT_PULL }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: ${{ secrets.SLACK_CHANGELOG_CHANNEL_ID }}
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}

      - name: Write release info artifact
        if: ${{ steps.flow.outputs.skipped != 'true' }}
        run: |
          mkdir -p /tmp/release-info
          cat > "/tmp/release-info/${{ matrix.repo.name }}.json" <<JSON
          {
            "repo": "${{ matrix.repo.fullName }}",
            "name": "${{ matrix.repo.name }}",
            "tag": "${{ steps.flow.outputs.tag }}",
            "prevTag": "${{ steps.flow.outputs.prev_tag }}",
            "workflow": "${{ matrix.repo.workflow }}",
            "commitSha": "${{ steps.flow.outputs.commit_hash }}",
            "tagPushedAt": "${{ steps.flow.outputs.tag_pushed_at }}"
          }
          JSON

      - uses: actions/upload-artifact@v4
        if: ${{ steps.flow.outputs.skipped != 'true' }}
        with:
          name: release-info-${{ matrix.repo.name }}
          path: /tmp/release-info/${{ matrix.repo.name }}.json

  changelog:
    name: Aggregate changelog
    needs: release
    if: ${{ always() && github.event.inputs.dry-run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-info-*
          path: /tmp/release-info
          merge-multiple: true

      - name: Build changelog body
        id: body
        run: |
          set -euo pipefail
          if ! ls /tmp/release-info/*.json >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          body=$(jq -rs '
            map("• *\(.name)* `\(.tag)` (draft) — <https://github.com/\(.repo)/releases|review>")
            | join("\n")
          ' /tmp/release-info/*.json)
          {
            echo "body<<__EOF__"
            echo "$body"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/notify-slack
        if: ${{ steps.body.outputs.skip != 'true' }}
        with:
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: ${{ secrets.SLACK_CHANGELOG_CHANNEL_ID }}
          title: "📝 Release drafts ready for review"
          body: ${{ steps.body.outputs.body }}
